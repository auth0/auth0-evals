name: Eval

on:
  workflow_dispatch:
    inputs:
      evals:
        description: 'Evals to run: "all" or comma-separated IDs (e.g. swift_quickstart,react_quickstart)'
        default: 'all'
        type: string
      modes:
        description: 'Modes to run: "all" | "baseline" | "agent" | comma-separated labels (e.g. baseline,agent-mcp)'
        default: 'all'
        type: string
      models:
        description: 'Models to run: "all" or comma-separated (e.g. gpt-5.2,claude-4-6-sonnet)'
        default: 'all'
        type: string
      agent_type:
        description: 'Agent runner (auto = Claude→claude-code, Gemini→gemini-cli, others→ReAct)'
        default: 'auto'
        type: choice
        options:
          - auto
          - auth0-ReAct-agent
          - claude-code
          - copilot
          - gemini-cli

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Compute the matrix from inputs ────────────────────────────────────────
  setup:
    name: Setup matrix
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6

      - name: Build matrix JSON
        id: build
        env:
          EVALS_INPUT:  ${{ inputs.evals   || 'all' }}
          MODES_INPUT:  ${{ inputs.modes   || 'all' }}
          MODELS_INPUT: ${{ inputs.models  || 'all' }}
        run: node scripts/build-matrix.js

  # ── Install deps and compile — runs once, in parallel with setup ──────────
  build:
    name: Install & Build
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/eval-build

  # ── N parallel eval jobs (one per eval × mode × model) ────────────────────
  run-evals:
    name: ${{ matrix.eval }} / ${{ matrix.mode.label }} / ${{ matrix.model }}
    needs: [setup, build]

    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js and npm (Artifactory)
        uses: ./.github/actions/setup-npm

      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist
          path: dist/

      - name: Install Claude Code CLI
        if: matrix.agent_type == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Gemini CLI
        if: matrix.agent_type == 'gemini-cli'
        run: npm install -g @google/gemini-cli

      - name: Run eval
        env:
          ATKO_API_KEY: ${{ secrets.ATKO_API_KEY }}
          CLAUDE_CODE_USE_BEDROCK_PROXY: 0
          GH_TOKEN: ${{ inputs.agent_type == 'copilot' && secrets.GH_COPILOT_TOKEN || '' }}
        run: |
          AGENT_TYPE="${{ inputs.agent_type || 'auto' }}"
          ARGS="--eval ${{ matrix.eval }} \
                --mode ${{ matrix.mode.mode }} \
                --model ${{ matrix.model }} \
                --output scores-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}.json"
          if [ "$AGENT_TYPE" != "auto" ]; then
            ARGS="$ARGS --agent-type $AGENT_TYPE"
          fi
          if [ -n "${{ matrix.mode.tools }}" ]; then
            ARGS="$ARGS --tools ${{ matrix.mode.tools }}"
          fi
          node dist/run.js $ARGS

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: result-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}
          path: scores-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}.json

  # ── Collect results and generate report ───────────────────────────────────
  report:
    name: Report
    needs: run-evals
    if: always()
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/eval-report
