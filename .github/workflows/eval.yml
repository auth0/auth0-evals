name: Eval

on:
  workflow_dispatch:
    inputs:
      evals:
        description: 'Evals to run: "all" or comma-separated IDs (e.g. swift_quickstart,react_quickstart)'
        default: 'all'
        type: string
      modes:
        description: 'Modes to run: "all" | "baseline" | "agent" | comma-separated labels (e.g. baseline,agent-skills,agent-mcp-skills)'
        default: 'all'
        type: string
      models:
        description: 'Models to run: "all" or comma-separated (e.g. gpt-5.4,claude-sonnet-4-6)'
        default: 'all'
        type: string
      agent_type:
        description: 'Agent runner (auto = Claude→claude-code, Gemini→gemini-cli, GPT→codex, others→copilot)'
        default: 'auto'
        type: choice
        options:
          - auto
          - claude-code
          - codex
          - copilot
          - gemini-cli

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Install deps and compile ──────────────────────────────────────────────
  build:
    name: Install & Build
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/eval-build

  # ── Compute the matrix from inputs (runs after build so dist/ is available) ──
  setup:
    name: Setup matrix
    needs: build
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write

    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eval-setup

      - name: Build matrix JSON
        id: build
        env:
          EVALS_INPUT:       ${{ inputs.evals      || 'all' }}
          MODES_INPUT:       ${{ inputs.modes      || 'all' }}
          MODELS_INPUT:      ${{ inputs.models     || 'all' }}
          AGENT_TYPE_INPUT:  ${{ inputs.agent_type || 'auto' }}
        run: node scripts/build-matrix.js

  # ── N parallel eval jobs (one per eval × mode × model) ────────────────────
  run-evals:
    name: ${{ matrix.eval }} / ${{ matrix.mode.label }} / ${{ matrix.model }}
    needs: [setup, build]

    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/eval-setup

      - name: Add node_modules/.bin to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run eval
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: 1
          CLAUDE_CLI_PATH: ${{ github.workspace }}/node_modules/.bin/claude
          GH_TOKEN: ${{ matrix.agent_type == 'copilot' && secrets.GH_COPILOT_TOKEN || github.token }}
          EVAL_ID: ${{ matrix.eval }}
          EVAL_MODE: ${{ matrix.mode.mode }}
          EVAL_MODE_LABEL: ${{ matrix.mode.label }}
          EVAL_MODEL: ${{ matrix.model }}
          EVAL_AGENT_TYPE: ${{ matrix.agent_type }}
          EVAL_TOOLS: ${{ matrix.mode.tools }}
        run: |
          ARGS=(
            --eval        "${EVAL_ID}"
            --mode        "${EVAL_MODE}"
            --model       "${EVAL_MODEL}"
            --agent-type  "${EVAL_AGENT_TYPE}"
            --dangerously-skip-sandbox
            --output      "scores-${EVAL_ID}-${EVAL_MODE_LABEL}-${EVAL_MODEL}.json"
          )
          if [ -n "${EVAL_TOOLS}" ]; then
            ARGS+=(--tools "${EVAL_TOOLS}")
          fi
          cd apps/auth0-evals && npm run evals -- "${ARGS[@]}"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: result-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}
          path: apps/auth0-evals/scores-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}.json

  # ── Collect results and generate report ───────────────────────────────────
  report:
    name: Report
    needs: run-evals
    if: always()
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/eval-report
