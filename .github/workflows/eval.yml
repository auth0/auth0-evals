name: Eval

on:
  workflow_dispatch:
    inputs:
      evals:
        description: 'Evals to run: "all" or comma-separated IDs (e.g. swift_quickstart,react_quickstart)'
        default: 'all'
        type: string
      modes:
        description: 'Modes to run: "all" | "baseline" | "agent" | comma-separated labels (e.g. baseline,agent-skills,agent-mcp-skills)'
        default: 'all'
        type: string
      models:
        description: 'Models to run: "all" or comma-separated (e.g. gpt-5.4,claude-4-6-sonnet)'
        default: 'all'
        type: string
      agent_type:
        description: 'Agent runner (auto = Claude→claude-code, Gemini→gemini-cli, GPT→copilot, others→ReAct)'
        default: 'auto'
        type: choice
        options:
          - auto
          - auth0-ReAct-agent
          - claude-code
          - copilot
          - gemini-cli

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Install deps and compile ──────────────────────────────────────────────
  build:
    name: Install & Build
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/eval-build

  # ── Compute the matrix from inputs (runs after build so dist/ is available) ──
  setup:
    name: Setup matrix
    needs: build
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist
          path: dist/

      - name: Build matrix JSON
        id: build
        env:
          EVALS_INPUT:       ${{ inputs.evals      || 'all' }}
          MODES_INPUT:       ${{ inputs.modes      || 'all' }}
          MODELS_INPUT:      ${{ inputs.models     || 'all' }}
          AGENT_TYPE_INPUT:  ${{ inputs.agent_type || 'auto' }}
        run: node scripts/build-matrix.js

  # ── N parallel eval jobs (one per eval × mode × model) ────────────────────
  run-evals:
    name: ${{ matrix.eval }} / ${{ matrix.mode.label }} / ${{ matrix.model }}
    needs: [setup, build]

    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js and npm (Artifactory)
        uses: ./.github/actions/setup-npm

      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-dist
          path: apps/auth0-evals/dist/

      - name: Install Claude Code CLI
        if: matrix.agent_type == 'claude-code'
        run: |
          npm install -g @anthropic-ai/claude-code@stable
          echo "CLAUDE_CLI_PATH=$(which claude)" >> "$GITHUB_ENV"

      - name: Install Gemini CLI
        if: matrix.agent_type == 'gemini-cli'
        run: npm install -g @google/gemini-cli

      - name: Run eval
        env:
          ATKO_API_KEY: ${{ secrets.ATKO_API_KEY }}
          CLAUDE_CODE_USE_BEDROCK_PROXY: 0
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: 1
          GH_TOKEN: ${{ matrix.agent_type == 'copilot' && secrets.GH_COPILOT_TOKEN || '' }}
        run: |
          ARGS="--eval ${{ matrix.eval }} \
                --mode ${{ matrix.mode.mode }} \
                --model ${{ matrix.model }} \
                --agent-type ${{ matrix.agent_type }} \
                --output scores-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}.json"
          if [ -n "${{ matrix.mode.tools }}" ]; then
            ARGS="$ARGS --tools ${{ matrix.mode.tools }}"
          fi
          node apps/auth0-evals/dist/run.js $ARGS

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: result-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}
          path: apps/auth0-evals/scores-${{ matrix.eval }}-${{ matrix.mode.label }}-${{ matrix.model }}.json

  # ── Collect results and generate report ───────────────────────────────────
  report:
    name: Report
    needs: run-evals
    if: always()
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/eval-report
