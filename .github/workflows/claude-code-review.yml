name: Claude Code PR Review
# this workflow is triggered by comments on issues or pull requests
# and runs the Claude Code Review workflow defined in the atko-cic/ai-pr-analyzer-gh-action repository
# References: https://oktawiki.atlassian.net/wiki/spaces/AAE/pages/3589472711/How+to+Review+PRs+with+Claude+Code
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: false
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

  pull_request:
    types: [ opened, ready_for_review ]

jobs:
  claude-review:
    uses: atko-cic/ai-pr-analyzer-gh-action/.github/workflows/claude-code-review.yml@main
