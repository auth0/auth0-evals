name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and npm
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and npm
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and npm
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
