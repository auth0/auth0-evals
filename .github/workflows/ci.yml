name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and npm
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and npm
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and npm
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
