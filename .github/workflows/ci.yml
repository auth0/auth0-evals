name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and npm (Artifactory)
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and npm (Artifactory)
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    runs-on:
      labels: ubuntu-22.04-2cpu-8ram-75ssd

    permissions:
      contents: read
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and npm (Artifactory)
        uses: ./.github/actions/setup-npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
