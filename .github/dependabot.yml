version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    rebase-strategy: auto
    versioning-strategy: auto
    commit-message:
      prefix: chore
      include: scope
    labels:
      - "dependencies"
    groups:
      # Keep the Codex CLI and its SDK in lockstep — the SDK spawns the codex
      # binary it pins, so bumping one without the other has no effect.
      openai-codex:
        patterns:
          - "@openai/codex"
          - "@openai/codex-sdk"
      # Keep the Claude Code CLI and Agent SDK in lockstep — they share a
      # release cadence and are easier to test together than separately.
      anthropic:
        patterns:
          - "@anthropic-ai/claude-code"
          - "@anthropic-ai/claude-agent-sdk"
