name: 'Eval Report'
description: 'Download results, generate HTML report, write job summary, and upload report artifact'

runs:
  using: composite
  steps:
    - name: Setup Node.js and npm (Artifactory)
      uses: ./.github/actions/setup-npm

    - name: Restore node_modules cache
      id: node-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies (cache miss fallback)
      if: steps.node-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: Download dist
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-dist

    - name: Link workspace bins
      shell: bash
      run: npm rebuild --ignore-scripts

    - name: Add node_modules/.bin to PATH
      shell: bash
      run: echo "${{ github.workspace }}/node_modules/.bin" >> "$GITHUB_PATH"

    - name: Download all results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: result-*
        merge-multiple: true
        path: apps/auth0-evals

    - name: Generate HTML report
      shell: bash
      run: cd apps/auth0-evals && npm run report

    - name: Write step summary
      shell: bash
      run: node scripts/write-summary.js

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: eval-report-${{ github.run_id }}
        path: |
          apps/auth0-evals/scores-*.json
          apps/auth0-evals/scores-consolidated.json
          apps/auth0-evals/report.html
