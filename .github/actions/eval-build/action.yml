name: 'Eval Build'
description: 'Install dependencies, build the eval framework, and upload dist artifact'

runs:
  using: composite
  steps:
    - name: Setup Node.js and npm (Artifactory)
      uses: ./.github/actions/setup-npm

    - name: Restore node_modules cache
      id: node-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.node-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run build

    - name: Upload dist
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-dist
        path: |
          apps/auth0-evals/dist/
          packages/eval-core/dist/
          packages/eval-graders/dist/
          packages/eval-reporter/dist/
          packages/eval/dist/
