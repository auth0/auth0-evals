name: 'Eval Build'
description: 'Install dependencies, build the eval framework, and upload dist artifact'

runs:
  using: composite
  steps:
    - name: Setup Node.js and npm (Artifactory)
      uses: ./.github/actions/setup-npm

    - name: Restore node_modules cache
      id: node-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.node-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run build

    - name: Upload dist
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: build-dist
        path: |
          apps/auth0-evals/dist/
          packages/eval-graders/dist/
          packages/eval-reporter/dist/
          packages/eval/dist/
