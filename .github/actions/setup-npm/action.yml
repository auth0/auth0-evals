name: Setup npm
description: Sets up Node.js with the public npm registry

inputs:
  node-version:
    description: Node.js version to use
    default: '24'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
